name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Configurar Java (necessário para o Gradle)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Instalar dependências
      - name: Instalar dependências
        run: npm ci

      # 5. Criar arquivo .env com as variáveis do Supabase
      - name: Criar arquivo .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      # 6. Build do projeto web (Vite)
      - name: Build web (Vite)
        run: npm run build

      # 7. Sincronizar com o Capacitor (copia dist/ para android/app/src/main/assets)
      - name: Sincronizar Capacitor
        run: npx cap sync android

      # 8. Permissão de execução no Gradle
      - name: Permissão no gradlew
        run: chmod +x android/gradlew

      # 9. Build do APK debug
      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 10. Upload do APK como artefato
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxLink-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. Criar Release automático (apenas em push na main/master)
      - name: Criar Release com APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            APK gerado automaticamente 🤖
            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
