name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências
        run: npm install

      - name: Criar arquivo .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build web (Vite)
        run: npm run build

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Permissão no gradlew
        run: chmod +x android/gradlew

      - name: Forçar versões corretas do Gradle e AGP
        run: |
          # Garantir que os diretórios existam
          mkdir -p android/gradle/wrapper

          # Reescrever gradle-wrapper.properties para a versão 8.11.1
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # Reescrever build.gradle com AGP 8.9.1 (exigido pela biblioteca Health Connect)
          cat > android/build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.9.1'
                  classpath 'com.google.gms:google-services:4.4.2'
              }
          }
          apply from: "variables.gradle"
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          GRADLE

          # Reescrever variables.gradle com compileSdk 36 (exigido pela biblioteca Health Connect)
          cat > android/variables.gradle << 'VARS'
          ext {
              minSdkVersion = 26
              compileSdkVersion = 36
              targetSdkVersion = 36
              androidxActivityVersion = '1.9.3'
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.15.0'
              androidxFragmentVersion = '1.8.5'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.12.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.2.1'
              androidxEspressoCoreVersion = '3.6.1'
              cordovaAndroidVersion = '10.1.1'
          }
          VARS
          
          # Adicionar supressão de aviso para SDK 36 no gradle.properties
          echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties

          echo "✅ Configurações atualizadas para AGP 8.9.1 e SDK 36"

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
          JAVA_TOOL_OPTIONS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxLink-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Criar Release com APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            APK gerado automaticamente 🤖
            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
