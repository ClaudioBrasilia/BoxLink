name: Build Android APK

on:
  push:
    branches:
      - Teste-Novo
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto web
        run: npm run build

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Adicionar plataforma Android
        run: npx cap add android || true

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Tornar gradlew executável
        run: chmod +x android/gradlew

      - name: Build do APK (debug para teste)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxLink-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
